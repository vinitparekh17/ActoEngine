<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            width: 450px; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
        }

        header {
            background: var(--card-bg);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h3 { 
            margin: 0; 
            font-size: 16px; 
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container {
            padding: 16px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover { 
            background: var(--primary-hover); 
        }

        button:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            opacity: 0.7;
        }

        button.btn-patch {
            background: var(--success);
        }

        button.btn-patch:hover {
            background: #059669;
        }

        button.btn-patch:disabled {
            background: var(--text-secondary);
        }

        #output { 
            margin-top: 16px; 
            max-height: 400px; 
            overflow-y: auto; 
        }

        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .file-header {
            padding: 10px 12px;
            background: #f1f5f9;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            word-break: break-all;
        }

        .match-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .match-item:last-child {
            border-bottom: none;
        }

        .match-row {
            display: flex;
            margin-bottom: 4px;
            font-size: 12px;
            align-items: baseline;
        }

        .label {
            color: var(--text-secondary);
            width: 85px;
            flex-shrink: 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value {
            font-family: 'Consolas', 'Monaco', monospace;
            color: var(--primary);
            font-weight: 600;
            word-break: break-all;
        }

        .line-info {
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .status-box {
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .status-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .status-empty { background: #f3f4f6; color: var(--text-secondary); border: 1px solid var(--border); padding: 24px 12px; }
        .status-patch { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }

        .settings-link {
            text-align: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .settings-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .settings-link a:hover {
            color: var(--primary);
        }

        /* SVG Icon styling */
        .icon { width: 16px; height: 16px; stroke-width: 2; }
        .icon-sm { width: 14px; height: 14px; stroke-width: 2; }
    </style>
</head>
<body>
    <header>
        <h3>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Pattern Finder
        </h3>
    </header>
    
    <div class="container">
        <div class="btn-group">
            <button id="searchBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
                Scan Page
            </button>
            <button id="patchBtn" class="btn-patch" disabled>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Sync Mappings
            </button>
        </div>
        
        <div id="output"></div>
        
        <div class="settings-link">
            <a href="#" id="openSettings">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                Configure Settings
            </a>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
